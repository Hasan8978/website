<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | APEX Atelier</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Montserrat',sans-serif;background:#0f0a1a;color:#fff;}
    :root{--gold:#E8B4B8;}
    .gold-text{color:var(--gold);}
    .register-container{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:120px 20px}
    .register-card{background:rgba(26,15,46,0.85);backdrop-filter:blur(16px);border:1px solid rgba(232,180,184,0.35);border-radius:32px;padding:45px 40px;width:100%;max-width:500px}
    .input-field{width:100%;background:rgba(0,0,0,0.5);border:1px solid rgba(232,180,184,0.3);border-radius:14px;padding:12px 16px;color:#fff;margin-bottom:15px}
    .btn-register{width:100%;background:linear-gradient(135deg,var(--gold),#C4848A);color:#1a0f2e;font-weight:700;padding:14px;border-radius:16px;border:none}
    .toast-msg{position:fixed;bottom:30px;right:30px;background:var(--gold);color:#1a0f2e;padding:12px 24px;border-radius:50px;z-index:10000}
  </style>
</head>
<body>

<div class="register-container">
  <div class="register-card">
    <div class="text-center mb-4"><div style="width:70px;height:70px;background:linear-gradient(135deg,rgba(232,180,184,0.15),rgba(0,0,0,0.5));border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 15px;border:1px solid rgba(232,180,184,0.4)"><i class="bi bi-gem fs-1 gold-text"></i></div><h2>Create <span class="gold-text">Account</span></h2></div>
    
    <div id="registerForm">
      <input type="text" class="input-field" id="regName" placeholder="Full Name" required>
      <input type="email" class="input-field" id="regEmail" placeholder="Email Address" required>
      <input type="tel" class="input-field" id="regPhone" placeholder="Phone Number" required>
      <input type="password" class="input-field" id="regPassword" placeholder="Password" required>
      <input type="password" class="input-field" id="regConfirmPassword" placeholder="Confirm Password" required>
      <button class="btn-register" onclick="sendVerificationOTP()">Sign Up</button>
    </div>
    
    <div id="otpSection" style="display:none">
      <p class="text-center small text-white-50">Verification code sent to <span id="verifyEmailDisplay"></span></p>
      <input type="text" class="input-field" id="verifyOTP" placeholder="Enter 6-digit code" maxlength="6">
      <button class="btn-register" onclick="verifyEmail()">Verify & Complete Registration</button>
      <button class="btn btn-outline-gold w-100 mt-2" onclick="resendVerifyOTP()">Resend Code</button>
    </div>
    
    <div class="text-center mt-4"><a href="login.html" class="gold-text">Already have an account?</a></div>
  </div>
</div>

<script>
  let verifyOTPCode = '';
  let pendingUser = {};
  
  function showToast(message) {
    const toast = document.createElement('div');
    toast.className = 'toast-msg';
    toast.innerHTML = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }
  
  function sendVerificationOTP() {
    const name = document.getElementById('regName').value;
    const email = document.getElementById('regEmail').value;
    const phone = document.getElementById('regPhone').value;
    const password = document.getElementById('regPassword').value;
    const confirm = document.getElementById('regConfirmPassword').value;
    
    if(!name || !email || !phone || !password) { alert('Please fill all fields'); return; }
    if(password !== confirm) { alert('Passwords do not match'); return; }
    
    pendingUser = { name, email, phone, password };
    
    verifyOTPCode = Math.floor(100000 + Math.random() * 900000).toString();
    console.log(`Verification OTP for ${email}: ${verifyOTPCode}`);
    showToast(`📧 Verification code sent to ${email} (Demo: ${verifyOTPCode})`);
    
    document.getElementById('verifyEmailDisplay').innerText = email;
    document.getElementById('registerForm').style.display = 'none';
    document.getElementById('otpSection').style.display = 'block';
  }
  
  function verifyEmail() {
    const enteredCode = document.getElementById('verifyOTP').value;
    if(enteredCode === verifyOTPCode) {
      // Save user to localStorage
      const users = JSON.parse(localStorage.getItem('apex-users')) || [];
      users.push({ ...pendingUser, registeredAt: new Date().toISOString() });
      localStorage.setItem('apex-users', JSON.stringify(users));
      
      // Auto-login
      localStorage.setItem('apex-current-user', JSON.stringify({ name: pendingUser.name, email: pendingUser.email, loggedIn: true }));
      localStorage.setItem('apex-logged-in', 'true');
      
      showToast('✓ Registration successful! Redirecting...');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
    } else {
      alert('Invalid verification code');
    }
  }
  
  function resendVerifyOTP() {
    verifyOTPCode = Math.floor(100000 + Math.random() * 900000).toString();
    console.log(`New verification code: ${verifyOTPCode}`);
    showToast(`📧 New code sent: ${verifyOTPCode}`);
  }
</script>
<script src="auto-images.js"></script>
<script src="slide-sidebar.js"></script>
<script src="animations.js"></script>
<script src="fix-buttons.js"></script>
</body>
</html>
